# Configure here your journeys. A journey is a sequence of requests at a certain load.
journeys {


  //  statement-of-liability API
  statement-of-liability = {

    description = "statement-of-liability"
    load = 0.01
    parts = [
      back-end-processes-retrieve-hello-world-response-from-Statement-of-Liability-Service
    ]
    run-if = ["statement-of-liability"]
  }

  // interest-forecasting API
  interest-forecasting = {

    description = "interest-forecasting"
    load = 0.01
    parts = [
      back-end-processes-retrieve-hello-world-response-from-interest-forecasting-Service
    ]
    run-if = ["interest-forecasting"]
  }


}